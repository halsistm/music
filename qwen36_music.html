<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Glowy Beats</title>
<style>
  :root {
    --bg-color: #050505;
    --led-off: #1a1a1a;
    --glow-strength: 6px;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  
  body {
    background: var(--bg-color);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    overflow: hidden;
    color: #ddd;
  }

  /* ── Header ─ */
  #header {
    text-align: center;
    padding: 12px 0 4px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
  }
  #title {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #fff;
    opacity: 0.6;
    margin-bottom: 2px;
  }
  #sub {
    font-size: 9px;
    letter-spacing: 1px;
    color: #444;
  }

  /* ── Effects Panel ── */
  #fx-panel {
    display: flex;
    justify-content: space-around;
    padding: 6px 4px;
    flex-shrink: 0;
    background: linear-gradient(to bottom, #111, #000);
    border-top: 1px solid #222;
    border-bottom: 1px solid #111;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 22%;
  }
  .slider-label {
    font-size: 8px;
    letter-spacing: 0.5px;
    color: #666;
    margin-bottom: 4px;
    font-weight: bold;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #0f0;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
  }

  /* ── Main Grid Area ── */
  #screen-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    min-height: 0; /* Flex item shrink fix */
  }
  #grid-container {
    width: 100%;
    max-width: 340px; /* Constrain width on larger phones/tablets */
    aspect-ratio: 10/20; /* Perfect 1:2 proportion */
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    grid-template-rows: repeat(20, 1fr);
    gap: 3px;
    padding: 4px;
    background: #000;
    border-radius: 12px;
    border: 1px solid #222;
    box-shadow: inset 0 0 30px rgba(0,0,0,1);
  }

  .led {
    background: var(--led-off);
    border-radius: 2px; /* Slightly rounded corners for hardware feel */
    transition: background-color 0.05s, box-shadow 0.1s;
    position: relative;
  }
  
  /* Active state logic handled via JS inline styles usually, 
     but this sets the base active look */
  .led:active {
    transform: scale(0.9);
    filter: brightness(1.2);
  }

  /* ── Footer Controls ── */
  #footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px 24px; /* Extra bottom padding for home indicator */
    flex-shrink: 0;
    background: #000;
  }
  .ctrl-btn {
    background: #111;
    border: 1px solid #333;
    color: #aaa;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .ctrl-btn.active-mode {
    background: #fff;
    color: #000;
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
  }
  .ctrl-btn.rec-active {
    background: #ff3333;
    border-color: #ff3333;
    color: white;
    animation: pulse-rec 1.5s infinite;
  }
  
  @keyframes pulse-rec {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  .bpm-display {
    font-family: monospace;
    color: #888;
    font-size: 18px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <div id="header">
    <div id="title">GLOWY BEATS</div>
    <div id="sub">ANALOG SEQUENCER</div>
  </div>

  <div id="fx-panel">
    <div class="slider-group">
      <span class="slider-label">RESONANCE</span>
      <input type="range" min="0" max="100" value="40" data-fx="resonance">
    </div>
    <div class="slider-group">
      <span class="slider-label">ECHO</span>
      <input type="range" min="0" max="100" value="20" data-fx="echo">
    </div>
    <div class="slider-group">
      <span class="slider-label">LFO</span>
      <input type="range" min="0" max="100" value="30" data-fx="lfo">
    </div>
    <div class="slider-group">
      <span class="slider-label">REVERB</span>
      <input type="range" min="0" max="100" value="15" data-fx="reverb">
    </div>
  </div>

  <div id="screen-area">
    <div id="grid-container"></div>
  </div>

  <div id="footer-bar">
    <button class="ctrl-btn" id="btn-rec">REC</button>
    <button class="ctrl-btn" id="btn-play">▶ LOOP</button>
    <div class="bpm-display">♩ 120</div>
    <button class="ctrl-btn" id="btn-stop">■ STOP</button>
    <button class="ctrl-btn" id="btn-clear">CLR</button>
  </div>

<script>
/* ── CONFIG ── */
const COLS = 10;
const ROWS = 20;
const TOTAL = COLS * ROWS;
const BPM = 120;
const STEP_TIME = 60 / BPM / 4; // 16th note timing

// Sound Color Palette based on Frequency Zones
const COLORS = {
  BASS: { r: 50, g: 200, b: 255 },     // Cyan/Light Blue
  MID:  { r: 255, g: 100, b: 255 },    // Magenta/Purple
  HIGH: { r: 255, g: 255, b: 100 },    // Yellow/White
};

// State
let ctx = null;
let masterGain = null;
let fxNodes = {}; // Store delay, reverb, etc.
let fxState = { resonance: 40, echo: 20, lfo: 30, reverb: 15 };

/* ── AUDIO ENGINE ── */
function initAudio() {
  if (!ctx) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    ctx = new AudioContext();
    
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    
    setupEffects();
    
    masterGain.connect(ctx.destination);
  }
}

function setupEffects() {
  // Delay
  const delay = ctx.createDelay(1.0);
  delay.delayTime.value = 0.15;
  const feedback = ctx.createGain();
  feedback.gain.value = 0.3;
  const wet = ctx.createGain();
  wet.gain.value = fxState.echo / 100;
  
  delay.connect(feedback);
  feedback.connect(delay);
  delay.connect(wet);
  fxNodes.delay = { src: delay, fb: feedback, wet: wet };

  // Reverb (Convolver simulation using simple noise buffer)
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const length = rate * 2.0; // 2 seconds
  const impulse = ctx.createBuffer(2, length, rate);
  const left = impulse.getChannelData(0);
  const right = impulse.getChannelData(1);
  for (let i = 0; i < length; i++) {
    const n = i / length;
    left[i] = (Math.random() * 2 - 1) * Math.pow(1 - n, 2.5);
    right[i] = (Math.random() * 2 - 1) * Math.pow(1 - n, 2.5);
  }
  convolver.buffer = impulse;
  const revWet = ctx.createGain();
  revWet.gain.value = fxState.reverb / 100;
  convolver.connect(revWet);
  fxNodes.reverb = { unit: convolver, wet: revWet };
  
  // LFO for Filter Modulation
  const lfo = ctx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 2; // Fixed slow LFO
  const lfoGain = ctx.createGain();
  lfoGain.gain.value = 0; // Driven by slider later
  lfo.connect(lfoGain);
  fxNodes.lfo = { node: lfo, gain: lfoGain };
  lfo.start();
}

// Master EQ / Distortion Chain
let distCurve = ctx ? ctx.createWaveShaper() : null;

function playNote(freq, row, velocity, time) {
  if (!ctx) return;
  const t = time || ctx.currentTime;
  const v = velocity;

  // Determine wave type based on Zone
  let waveType = 'triangle';
  let vol = 0.4;
  
  // Zone mapping: 0-4 (Bass), 5-13 (Mid), 14-19 (High)
  if (row > 15) {
    waveType = 'square';
    vol = 0.15; // Hi-hats / Noise
  } else if (row > 5) {
    waveType = ['sawtooth', 'square'][row % 2]; // Alternating
    vol = 0.3;
  } else {
    waveType = 'sawtooth';
    vol = 0.4;
  }

  const osc = ctx.createOscillator();
  osc.type = waveType;
  osc.frequency.setValueAtTime(freq, t);
  
  // Add slight detune for analog warmth
  osc.detune.value = (Math.random() - 0.5) * 10;

  // Filter
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  const res = fxState.resonance / 100 * 20 + 0.1;
  filter.Q.value = res;
  
  // Envelope for Filter (Cutoff goes up then down)
  filter.frequency.setValueAtTime(200, t);
  filter.frequency.linearRampToValueAtTime(Math.min(freq * 4, 8000), t + 0.02);
  
  // LFO Connection
  // Only apply LFO to mids/highs
  if (row > 6 && fxState.lfo > 10) {
    fxNodes.lfo.gain.disconnect();
    fxNodes.lfo.gain.connect(filter.frequency);
    // Amount scaled by slider
    const amount = (fxState.lfo / 100) * 500 * (row > 15 ? 2 : 1);
    fxNodes.lfo.gain.gain.setValueAtTime(amount, t);
  }

  // Amp Envelope
  const amp = ctx.createGain();
  amp.gain.setValueAtTime(0, t);
  amp.gain.linearRampToValueAtTime(v * vol, t + 0.01);
  const decay = fxState.reverb ? 0.2 : 0.05;
  amp.gain.exponentialRampToValueAtTime(0.001, t + (waveType === 'square' ? 0.1 : 0.3));
  
  // Routing
  osc.connect(filter);
  filter.connect(amp);
  amp.connect(masterGain);
  
  // Send to Delay
  fxNodes.delay.src.connect(fxNodes.delay.wet);
  amp.connect(fxNodes.delay.src);

  // Send to Reverb
  amp.connect(fxNodes.reverb.unit);
  fxNodes.reverb.wet.connect(masterGain);

  osc.start(t);
  osc.stop(t + 0.5);
}

// ── MAPPING: 10x20 GRID ──
// Map Row 19 (bottom) = Lowest note. Row 0 (top) = Highest note.
function getFrequency(col, row) {
  // Base Octave 1 (Very Low)
  // Formula: Logarithmic distribution
  const maxNotes = 20; // Rows
  const octaveBase = 1; // Start octave
  const totalOctaves = 4; // Range
  
  // Note position 0..1
  const pos = row / (maxNotes - 1); 
  
  // We invert Y: Row 19 -> Pos 0 (Low), Row 0 -> Pos 1 (High)
  const invPos = 1 - pos;
  
  const midiNum = (octaveBase * 12) + (invPos * 48); // 4 octaves range
  
  return 440 * Math.pow(2, (midiNum - 69) / 12);
}

/* ── UI & INTERACTION ── */
const gridContainer = document.getElementById('grid-container');
const leds = [];
const ledStates = []; // { brightness, r, g, b }

function buildGrid() {
  for (let i = 0; i < TOTAL; i++) {
    const div = document.createElement('div');
    div.className = 'led';
    div.dataset.idx = i;
    gridContainer.appendChild(div);
    leds.push(div);
    ledStates.push({ r: 10, g: 10, b: 10, v: 0 });
  }
}
buildGrid();

function handleInteraction(col, row, velocity) {
  initAudio();
  
  const idx = row * COLS + col;
  const freq = getFrequency(col, row);
  
  // Play Sound
  playNote(freq, row, velocity, ctx ? ctx.currentTime : null);
  
  // Visual Effect
  const rd = ROWS_DEF(row);
  
  // Direct Hit
  triggerLed(idx, rd.color, 1.0);
  
  // Ripple neighbors
  const ripple = 1;
  for (let dr = -ripple; dr <= ripple; dr++) {
    for (let dc = -ripple; dc <= ripple; dc++) {
      const nr = row + dr;
      const nc = col + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        const dist = Math.sqrt(dr*dr + dc*dc);
        if (dist <= ripple && dist > 0) {
          const fade = 1 - (dist / (ripple + 1));
          const nIdx = nr * COLS + nc;
          triggerLed(nIdx, rd.color, fade * 0.5);
        }
      }
    }
  }
}

function triggerLed(index, color, intensity) {
  const ls = ledStates[index];
  ls.v = intensity;
  ls.r = color.r;
  ls.g = color.g;
  ls.b = color.b;
}

function ROWS_DEF(r) {
  // Determine color zone based on Row index (Vertical Gradient)
  // Bottom 5 rows (15-19) = Bass (Blue/Cyan)
  // Mid 10 rows (5-14) = Lead (Purple/Magenta)
  // Top 5 rows (0-4)   = High (Yellow/Green)
  if (r > 15) return { color: COLORS.BASS };
  if (r > 5) return { color: COLORS.MID };
  return { color: COLORS.HIGH };
}

// Input Handlers
let activeTouches = new Map();
let holdTimers = new Map();

function startTouch(e) {
  e.preventDefault();
  initAudio();
  
  // Loop through changed touches (multi-touch)
  Array.from(e.changedTouches).forEach(touch => {
    const { x, y } = getCoords(touch.clientX, touch.clientY);
    const key = touch.identifier;
    
    activeTouches.set(key, { col: x, row: y, timer: null });
    handleInteraction(x, y, 0.8);
    
    // Setup auto-pulse loop if holding
    const interval = setInterval(() => {
      const current = activeTouches.get(key);
      // Check if still touching same spot
      if (current && !isTouchingScreen()) {
         clearInterval(interval);
         activeTouches.delete(key);
         return;
      }
      // Pulse slowly while holding
      handleInteraction(current.col, current.row, 0.2);
    }, 250); // Auto-fire every quarter note approx
    
    activeTouches.get(key).timer = interval;
  });
}

function moveTouch(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(touch => {
    const { x, y } = getCoords(touch.clientX, touch.clientY);
    const info = activeTouches.get(touch.identifier);
    if (info) {
      info.col = x;
      info.row = y;
      handleInteraction(x, y, 0.5);
    }
  });
}

function endTouch(e) {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(touch => {
    const info = activeTouches.get(touch.identifier);
    if (info && info.timer) clearInterval(info.timer);
    activeTouches.delete(touch.identifier);
  });
}

function isTouchingScreen() {
  return document.body.getAttribute('data-touch') === 'true';
}
document.addEventListener('touchstart', () => document.body.setAttribute('data-touch', 'true'), {passive:true});
document.addEventListener('touchend', () => document.body.removeAttribute('data-touch'));


// Coordinate Mapping
function getCoords(clientX, clientY) {
  const rect = gridContainer.getBoundingClientRect();
  // Handle potential rotation/offset if needed, but standard flow assumes full container fill
  const x = Math.max(0, Math.min(COLS - 1, Math.floor(((clientX - rect.left) / rect.width) * COLS)));
  const y = Math.max(0, Math.min(ROWS - 1, Math.floor(((clientY - rect.top) / rect.height) * ROWS)));
  return { x, y };
}

// Attach listeners
gridContainer.addEventListener('touchstart', startTouch, { passive: false });
gridContainer.addEventListener('touchmove', moveTouch, { passive: false });
gridContainer.addEventListener('touchend', endTouch, { passive: false });

// Mouse support for testing
let mouseDown = false;
gridContainer.addEventListener('mousedown', (e) => {
  mouseDown = true;
  const { x, y } = getCoords(e.clientX, e.clientY);
  handleInteraction(x, y, 0.8);
  gridContainer.setAttribute('data-mouse', 'true');
});
gridContainer.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const { x, y } = getCoords(e.clientX, e.clientY);
  handleInteraction(x, y, 0.4);
});
gridContainer.addEventListener('mouseup', () => mouseDown = false);
gridContainer.addEventListener('mouseleave', () => mouseDown = false);


/* ── ANIMATION LOOP ── */
function render() {
  for (let i = 0; i < TOTAL; i++) {
    const s = ledStates[i];
    if (s.v > 0.02) {
      s.v *= 0.88; // Decay curve
    } else {
      s.v = 0;
      s.r = 10; s.g = 10; s.b = 10;
    }
    
    if (s.v > 0) {
      const val = s.v;
      const r = Math.round(s.r * val + 15 * (1-val));
      const g = Math.round(s.g * val + 15 * (1-val));
      const b = Math.round(s.b * val + 15 * (1-val));
      
      leds[i].style.backgroundColor = `rgb(${r},${g},${b})`;
      leds[i].style.boxShadow = `0 0 ${val * 15}px rgb(${s.r},${s.g},${s.b})`;
    } else {
      leds[i].style.backgroundColor = '#1a1a1a';
      leds[i].style.boxShadow = 'none';
    }
  }
  requestAnimationFrame(render);
}
render();

/* ── FX SLIDERS ── */
document.querySelectorAll('[data-fx]').forEach(el => {
  el.addEventListener('input', (e) => {
    const key = e.target.dataset.fx;
    const val = parseInt(e.target.value);
    fxState[key] = val;
    
    // Realtime updates
    if (key === 'reverb') {
      fxNodes.reverb.wet.gain.value = val / 100;
    } else if (key === 'echo') {
      fxNodes.delay.wet.gain.value = val / 100;
    }
  });
});

/* ── CONTROLS ── */
const btnRec = document.getElementById('btn-rec');
const btnPlay = document.getElementById('btn-play');
const btnStop = document.getElementById('btn-stop');
const btnClear = document.getElementById('btn-clear');

let isRecording = false;
let recordingStartTime = 0;
let recordedPattern = []; // {col, row, time, vel}
let isPlaying = false;
let playbackTimer = null;

btnRec.addEventListener('click', () => {
  initAudio();
  if (!isRecording) {
    isRecording = true;
    btnRec.classList.add('rec-active');
    btnRec.innerText = "● REC";
    recordedPattern = [];
    recordingStartTime = ctx ? ctx.currentTime : 0;
  } else {
    isRecording = false;
    btnRec.classList.remove('rec-active');
    btnRec.innerText = "REC";
  }
});

btnPlay.addEventListener('click', () => {
  initAudio();
  if (isPlaying) {
    stopLoop();
  } else {
    if (recordedPattern.length === 0) generateRandomPattern();
    isPlaying = true;
    btnPlay.classList.add('active-mode');
    scheduleLoop(recordedPattern);
  }
});

btnStop.addEventListener('click', () => {
  stopLoop();
  if (isRecording) {
    isRecording = false;
    btnRec.classList.remove('rec-active');
    btnRec.innerText = "REC";
  }
});

btnClear.addEventListener('click', () => {
  recordedPattern = [];
  isPlaying = false;
  stopLoop();
  btnPlay.classList.remove('active-mode');
});

function stopLoop() {
  isPlaying = false;
  clearTimeout(playbackTimer);
  playbackTimer = null;
  btnPlay.classList.remove('active-mode');
}

function scheduleLoop(pattern) {
  if (!isPlaying) return;
  
  const now = ctx ? ctx.currentTime : 0;
  
  // Find next events within a short window
  pattern.forEach(note => {
    // Relative times in loop
    const relTime = ((note.time % 2.0) + 2.0) % 2.0; // 2 second loop cycle for demo
    if (relTime >= now && relTime < now + 0.05) {
      playNote(getFrequency(note.col, note.row), note.row, note.vel, relTime);
      triggerLed(note.row * COLS + note.col, getZoneColor(note.row), 1.0);
    }
  });
  
  playbackTimer = setTimeout(() => scheduleLoop(pattern), 50);
}

// Helper to get color for loop visualization
function getZoneColor(r) {
  if (r > 15) return COLORS.BASS;
  if (r > 5) return COLORS.MID;
  return COLORS.HIGH;
}

function generateRandomPattern() {
  // Simple procedural generation for demo
  const p = [];
  for (let i = 0; i < 32; i++) {
    const time = i * 0.125; // 16th notes
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    // Chance based on row
    const prob = r > 15 ? 0.1 : (r < 5 ? 0.3 : 0.2);
    if (Math.random() < prob) {
      p.push({ col: c, row: r, time: time, vel: 0.5 + Math.random()*0.5 });
    }
  }
  recordedPattern = p;
  // Show alert or something? Nah, just silent ready state.
}

</script>
</body>
</html>
